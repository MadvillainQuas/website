                // postMessage handler — idempotent.
                if (doc.body) doc.body.classList.add('prophesy-embedded');

                if (!doc.getElementById('prophesy-embedded-styles')) {
                    const style = doc.createElement('style');
                    style.id = 'prophesy-embedded-styles';
                    style.textContent = `
                        /* Kill the entire URL-fetcher card (wrapper's splash
                           + Manual URL flow replaces it). The inputs are
                           kept in the DOM but offscreen so the wrapper can
                           still drive them programmatically. */
                        body.prophesy-embedded #url-fetch-section {
                            display: none !important;
                            visibility: hidden !important;
                        }
                        /* Belt-and-braces: any element whose visible text was
                           "Tauri Desktop App" carries this attribute (set by
                           our scrubber below). */
                        body.prophesy-embedded [data-prophesy-hide],
                        body.prophesy-embedded .tauri-only,
                        body.prophesy-embedded .live-mode-toggle,
                        body.prophesy-embedded #refresh-interval-container,
                        body.prophesy-embedded #live-status-panel {
                            display: none !important;
                        }
                        /* Kill GAMEVIS's own "← Back to Upload" / "Back to
                           Games" nav button and the "Skip to main content"
                           a11y link — both are redundant inside the Prophesy
                           wrapper, which already has its own top nav +
                           SWITCH/RELOAD bar above the iframe. The :focus
                           override on .skip-link would otherwise pop it
                           visible whenever the user tabbed in. */
                        body.prophesy-embedded .nav-back-btn,
                        body.prophesy-embedded .skip-link,
                        body.prophesy-embedded .skip-link:focus {
                            display: none !important;
                        }
                    `;
                    doc.head.appendChild(style);
                    console.log('[GVWrapper] Injected embedded-mode styles into iframe');
                }

                // First scrub for visible "Tauri" text — covers any literal
                // strings GAMEVIS may render outside #url-fetch-section.
                scrubTauriLabels(doc);

                // Watch for re-renders. GAMEVIS rebuilds chunks of the page
                // when the user changes tabs / enters live mode, so we need
                // to keep killing any Tauri labels that come back.
                if (!doc.body || doc.body._prophesyTauriObserver) return true;
                const obs = new MutationObserver(() => scrubTauriLabels(doc));
                obs.observe(doc.body, { childList: true, subtree: true, characterData: true });
                doc.body._prophesyTauriObserver = obs;
                return true;
            } catch (e) {
                console.warn('[GVWrapper] Could not inject embedded-mode styles:', e);
                return false;
            }
        }

        // Walk the iframe DOM and hide any element whose visible text is the
        // bare phrase "Tauri Desktop App" (and a few obvious siblings). We
        // mark them with a data-attribute that the injected stylesheet
        // already targets, so the next observer tick is a no-op.
        function scrubTauriLabels(doc) {
            try {
                if (!doc) return;
                // Quick text-content scan — only look at small leaf elements
                // (span / em / small / badge-like divs) so we don't accidentally
                // hide an entire card that mentions Tauri in passing.
                const leafSel = 'span, em, small, b, i, strong, [class*="badge"], [class*="pill"], [class*="chip"]';
                const nodes = doc.querySelectorAll(leafSel);
                for (let i = 0; i < nodes.length; i++) {
                    const n = nodes[i];
                    if (n.dataset && n.dataset.prophesyHide) continue;
                    const t = (n.textContent || '').trim();
                    if (!t || t.length > 64) continue;
                    if (/^Tauri\s*Desktop\s*App$/i.test(t) || /^Tauri$/i.test(t)) {
                        n.setAttribute('data-prophesy-hide', '1');
                    }
                }
            } catch (_) {}
        }

        // (onLiveTickComplete is declared earlier — see the live-mode block.)

        // ───────────────────── URL sync (bookmarkable games) ──────────────
        // Update the address bar when a game is selected, so the URL is
        // shareable. Uses replaceState (not pushState) so we don't create
        // browser-history clutter every time the user clicks around.
        function syncUrlGame(gameId) {
            try {
                const url = new URL(window.location.href);
                if (gameId) url.searchParams.set('game', String(gameId));
                else url.searchParams.delete('game');
                history.replaceState(null, '', url.toString());
            } catch (_) {}
        }

        // ───────────────────── iframe message handler ─────────────────────
        window.addEventListener('message', (ev) => {
            const data = ev.data;
            if (!data || typeof data !== 'object' || data.source !== 'slb-remote-app') return;
            switch (data.type) {
                case 'APP_READY':
                    if (configLoaded) respondToPasswordRequest(data);
                    else pendingPasswordRequests.push(data);
                    postToFrame('EMBEDDED_MODE_INFO', { embedded: true, host: 'prophesy-web' });
                    break;
                case 'REQUEST_SAVED_PASSWORD':
                    if (configLoaded) respondToPasswordRequest(data);
                    else pendingPasswordRequests.push(data);
                    break;
                case 'AUTH_SUCCESS':
                    // After unlock, push the active competition (if any) so the
                    // user sees games as soon as they're past the gate.
                    // Gated on SCHEDULE_LOADING_DISABLED.
                    if (compsLoaded && !SCHEDULE_LOADING_DISABLED) {
                        const code = compSelect.value;
                        if (code && !document.body.classList.contains('gv-mode-manual')) {
                            pushScheduleUrlsToFrame(code, /* fromBoot */ true);
                        }
                    }
                    break;
                case 'SAVE_PASSWORD':
                    postToFrame('PASSWORD_SAVED');   break;
                case 'CLEAR_SAVED_PASSWORD':
                    postToFrame('PASSWORD_CLEARED'); break;
                default: break;
            }
        });

        // ───────────────────── wire UI ────────────────────────────────────
        // Top-bar comp dropdown — reload when changed.
        // Both the dropdown change and the Reload button are inert while
        // SCHEDULE_LOADING_DISABLED is on; the Reload button is also
        // visually disabled below.
        compSelect.addEventListener('change', () => {
            updateCompMeta();
            const code = compSelect.value;
            if (!code) return;
            if (SCHEDULE_LOADING_DISABLED) {
                showStatus('Competition loading is temporarily disabled — use Manual URL.', 'err', 4000);
                return;
            }
            pushScheduleUrlsToFrame(code, false);
        });
        compLoadBtn.addEventListener('click', () => {
            if (SCHEDULE_LOADING_DISABLED) {
                showStatus('Competition loading is temporarily disabled — use Manual URL.', 'err', 4000);
                return;
            }
            const code = compSelect.value;
            if (!code) { showStatus('Pick a competition first.', 'err', 3000); return; }
            pushScheduleUrlsToFrame(code, false);
        });

        // Switch button → re-show the splash so user can pick differently.
        switchBtn?.addEventListener('click', () => showSplash());

        // Splash competition card — would normally kick off a background
        // preload as soon as the user changes the dropdown, but that's
        // gated on SCHEDULE_LOADING_DISABLED.
        splashComp?.addEventListener('change', () => {
            updateSplashCompMeta();
            if (splashComp.value && !SCHEDULE_LOADING_DISABLED) preloadCompSchedule(splashComp.value);
        });
        const splashCompPick = () => {
            if (SCHEDULE_LOADING_DISABLED) {
                setSplashStatus('Competition loading is temporarily disabled. Use Manual URL on the right to open a specific game.', 'err');
                return;
            }
            const code = splashComp?.value;
            if (!code) { setSplashStatus('Pick a competition from the dropdown first.', 'err'); return; }
            const c = compMap.get(code);
            if (!c || !c.scheduleUrls.length) {
                setSplashStatus('No schedule URLs configured for ' + (c?.label || code) + '. Set them up in the admin dashboard.', 'err');
                return;
            }
            compSelect.value = code;
            updateCompMeta();
            try {
                const u = new URL(window.location.href);
                u.searchParams.set('comp', code);
                u.searchParams.delete('game');
                history.replaceState(null, '', u.toString());
                initialCompFromUrl = code;
            } catch (_) {}
            setSplashStatus('Loading ' + (c.label || code) + '…');
            showLoading('Loading ' + (c.label || code), 'Fetching ' + c.scheduleUrls.length + ' schedule page' + (c.scheduleUrls.length === 1 ? '' : 's') + '…');
            dismissSplash(() => pushScheduleUrlsToFrame(code, true));
        };
        splashCompGo?.addEventListener('click', splashCompPick);
        splashComp?.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); splashCompPick(); } });

        // Splash manual URL card
        const splashManualPick = () => {
            const url = (splashUrl?.value || '').trim();
            if (!url) { setSplashStatus('Paste a FIBA LiveStats game URL first.', 'err'); splashUrl?.focus(); return; }
            try {
                const m = url.match(/\/(\d{5,12})(?:\/|\?|#|$)/) || url.match(/[?&](?:matchId|gameId)=(\d{5,12})/i);
                const u = new URL(window.location.href);
                u.searchParams.delete('comp');
                if (m) u.searchParams.set('game', m[1]); else u.searchParams.delete('game');
                history.replaceState(null, '', u.toString());
                if (m) initialGameFromUrl = m[1];
            } catch (_) {}
            setSplashStatus('Fetching game from URL…');
            showLoading('Loading game', 'Pulling data.json from the FIBA LiveStats API…');
            dismissSplash(() => loadManualUrl(url));
        };
        splashUrlGo?.addEventListener('click', splashManualPick);
        splashUrl?.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); splashManualPick(); } });
        // Pre-fill last manual URL so people don't have to re-paste it on revisit
        try {
            const remembered = localStorage.getItem(GAMEVIS_MANUAL_KEY);
            if (remembered && splashUrl) splashUrl.value = remembered;
        } catch (_) {}

        liveToggle.addEventListener('click', () => {
            if (isLive()) stopLive();
            else startLive();
        });

        // Restore live state from previous session.
        try {
            if (localStorage.getItem(GAMEVIS_LIVE_KEY) === '1') startLive();
        } catch (_) {}

        // Defensive proactive push on iframe load (in case APP_READY never fires).
        // Also installs the JSON-API interceptor on the in-iframe FIBAGameVisualizer
        // instance — same-origin so we can reach it directly. Retries a few times
        // because the visualizer is constructed AFTER DOMContentLoaded.
        iframe.addEventListener('load', () => {
            // 1) Strip Tauri UI immediately — runs unconditionally, doesn't
            //    wait for the visualizer instance. Retried below in the patch
            //    loop in case the iframe DOM isn't ready on the first tick.
            injectEmbeddedStyles();

            setTimeout(() => {
                if (configLoaded) respondToPasswordRequest({});
                postToFrame('EMBEDDED_MODE_INFO', { embedded: true, host: 'prophesy-web' });
                if (compsLoaded && !SCHEDULE_LOADING_DISABLED) {
                    const code = compSelect.value;
                    if (code && !splashIsVisible()) {
                        pushScheduleUrlsToFrame(code, true);
                    }
                }
                // Re-attempt the Tauri scrub once the iframe head has had a moment
                injectEmbeddedStyles();
            }, 350);

            // Patch selectGame as soon as the visualizer instance shows up.
            // We retry up to ~10 s because GAMEVIS's auth gate can delay
            // construction (instance is only created after the password is
            // accepted in some flows, before in others — be defensive).
            let attempts = 0;
            const tryPatch = () => {
                installJsonInterceptors();
                const patched = !!(iframe.contentWindow && iframe.contentWindow.fibaVisualizer && iframe.contentWindow.fibaVisualizer._prophesyJsonPatched);
                if (patched) {
                    // Once the visualizer is patched, deep-link to the game in
                    // the URL (?game=<id>) — works even without a comp picked.
                    if (initialGameFromUrl) {
                        try {
                            const v = iframe.contentWindow.fibaVisualizer;
                            if (typeof v.selectGame === 'function') {
                                showStatus('Deep-link · loading game ' + initialGameFromUrl + '…', null, 4500);
                                v.selectGame(initialGameFromUrl);
                                initialGameFromUrl = ''; // only fire once
                            }
                        } catch (_) {}
                    }
                    return;
                }
                if (++attempts < 25) setTimeout(tryPatch, 400);
            };
            setTimeout(tryPatch, 400);
        });

        // ─── Apply SCHEDULE_LOADING_DISABLED to the visible UI ───────
        // The schedule-load actions are inert under the flag; mark the
        // two action buttons disabled at boot and drop a small hint
        // inside the splash Competition card so users know to use
        // Manual URL instead. Easy to flip back on later.
        if (SCHEDULE_LOADING_DISABLED) {
            try {
                if (splashCompGo) {
                    splashCompGo.disabled = true;
                    splashCompGo.title = 'Competition loading is temporarily disabled — use Manual URL on the right.';
                    splashCompGo.style.opacity = '0.45';
                    splashCompGo.style.cursor = 'not-allowed';
                }
                if (compLoadBtn) {
                    compLoadBtn.disabled = true;
                    compLoadBtn.title = 'Competition loading is temporarily disabled.';
                    compLoadBtn.style.opacity = '0.45';
                    compLoadBtn.style.cursor = 'not-allowed';
                }
                // Subtle note inside the splash Competition card. We append
                // to the existing gv-splash-comp-meta line so we don't add
                // any extra DOM nodes.
                if (splashCompMeta) {
                    splashCompMeta.textContent = '⏸ Competition loading temporarily disabled — use Manual URL';
                    splashCompMeta.style.color = '#e0c078';
                }
                // Tone down the whole Competition card so the eye lands on
                // the still-working Manual URL card to its right.
                const compCard = splashComp && splashComp.closest('.gv-splash-card');
                if (compCard) compCard.style.opacity = '0.55';
            } catch (_) {}
        }

        // Boot: load password + competitions in parallel
        loadLineupConfig();
        loadCompetitions();

        // Splash always shows. Deep-link URL params just pre-select the
        // appropriate splash card — the user still confirms with Open / Load.
        // (Previously we skipped the splash on deep-link, but the user wanted
        // a consistent landing experience, and pre-fill is the safer default
        // anyway since they can change their mind.)
        if (initialGameFromUrl) {
            // Deep-link to a single game → pre-fill the manual URL field.
            // Use the canonical /data/<id>/data.json shape since that's what
            // we actually fetch, and the user might want to copy/share it.
            try {
                if (splashUrl && !splashUrl.value) {
                    splashUrl.value = FIBA_JSON_BASE + initialGameFromUrl + '/data.json';
                }
            } catch (_) {}
        }
        // initialCompFromUrl is already used inside renderCompSelect to
        // preselect the dropdown, so nothing more to do here.
        showSplash();
        setTimeout(hideStatus, 12000);
    </script>
</body>
</html>
